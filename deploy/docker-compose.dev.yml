services:
  backend:
    build:
      context: ../backend
      dockerfile: ${NOMOS_BACKEND_DOCKERFILE:-Dockerfile}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      NOMOS_ENV: dev
      NOMOS_API_HOST: ${NOMOS_API_HOST:-0.0.0.0}
      NOMOS_API_PORT: ${NOMOS_API_PORT:-8000}
      NOMOS_WORKSPACE_ROOT: ${NOMOS_WORKSPACE_ROOT:-/workspaces}
      NOMOS_GIT_PROVIDER: ${NOMOS_GIT_PROVIDER:-github}
      NOMOS_GIT_REPO_URL: ${NOMOS_GIT_REPO_URL}
      NOMOS_GIT_DEFAULT_BRANCH: ${NOMOS_GIT_DEFAULT_BRANCH:-main}
      NOMOS_GIT_TOKEN: ${NOMOS_GIT_TOKEN}
      NOMOS_AI_ENABLED: ${NOMOS_AI_ENABLED:-false}
      NOMOS_AI_PROVIDER: ${NOMOS_AI_PROVIDER}
      NOMOS_AI_API_KEY: ${NOMOS_AI_API_KEY}
      NOMOS_LOG_LEVEL: ${NOMOS_LOG_LEVEL:-INFO}
    volumes:
      - ../backend:/app
      - nomos_workspaces:/workspaces
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ${NOMOS_FRONTEND_DOCKERFILE:-Dockerfile}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    environment:
      NOMOS_ENV: dev
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  proxy:
    image: caddy:2.9
    profiles: ["proxy"]
    ports:
      - "8080:80"
    volumes:
      - ./reverse-proxy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend

volumes:
  nomos_workspaces:
